<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Weather Analytics</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 25%, #7e22ce 50%, #ec4899 75%, #f59e0b 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 300px;
            height: 100vh;
            background: rgba(17, 24, 39, 0.98);
            backdrop-filter: blur(20px);
            box-shadow: 4px 0 30px rgba(0, 0, 0, 0.3);
            padding: 30px 20px;
            z-index: 1000;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header {
            margin-bottom: 50px;
            text-align: center;
        }

        .sidebar-header h2 {
            background: linear-gradient(135deg, #06b6d4, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .sidebar-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-item {
            padding: 18px 24px;
            margin: 12px 0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 18px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            opacity: 0;
            transition: opacity 0.4s;
            border-radius: 16px;
        }

        .nav-item:hover::before {
            opacity: 0.15;
        }

        .nav-item:hover {
            color: white;
            transform: translateX(8px);
        }

        .nav-item.active {
            background: linear-gradient(135deg, #06b6d4, #3b82f6, #8b5cf6);
            color: white;
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.4);
        }

        .nav-item.active::before {
            opacity: 0;
        }

        .nav-item i {
            font-size: 22px;
            width: 28px;
            position: relative;
            z-index: 1;
        }

        .nav-item span {
            position: relative;
            z-index: 1;
        }

        .main-content {
            margin-left: 300px;
            padding: 40px;
            min-height: 100vh;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #06b6d4, #3b82f6, #8b5cf6, #ec4899, #f59e0b);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .header h1 {
            color: white;
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .header .date-time {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            font-weight: 500;
        }

        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .connection-status.connected {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .connection-status.disconnected {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .connection-status.connecting {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #22c55e;
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
        }

        .status-dot.disconnected {
            background: #ef4444;
        }

        .status-dot.connecting {
            background: #f59e0b;
            animation: connectingPulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        @keyframes connectingPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .weather-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .weather-card {
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .weather-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
        }

        .weather-card:nth-child(1)::before {
            background: linear-gradient(90deg, #f59e0b, #ef4444);
        }

        .weather-card:nth-child(2)::before {
            background: linear-gradient(90deg, #06b6d4, #3b82f6);
        }

        .weather-card:nth-child(3)::before {
            background: linear-gradient(90deg, #8b5cf6, #ec4899);
        }

        .weather-card:nth-child(4)::before {
            background: linear-gradient(90deg, #10b981, #06b6d4);
        }

        .weather-card:nth-child(5)::before {
            background: linear-gradient(90deg, #ec4899, #f59e0b);
        }

        .weather-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        .weather-card-icon {
            font-size: 56px;
            margin-bottom: 24px;
            filter: drop-shadow(0 4px 12px rgba(59, 130, 246, 0.4));
        }

        .weather-card:nth-child(1) .weather-card-icon {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .weather-card:nth-child(2) .weather-card-icon {
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .weather-card:nth-child(3) .weather-card-icon {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .weather-card:nth-child(4) .weather-card-icon {
            background: linear-gradient(135deg, #10b981, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .weather-card:nth-child(5) .weather-card-icon {
            background: linear-gradient(135deg, #ec4899, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .weather-card-title {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .weather-card-value {
            color: white;
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -2px;
        }

        .weather-card-unit {
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            font-weight: 600;
        }

        .rain-indicator {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        .rain-indicator.yes {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
        }

        .rain-indicator.no {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            box-shadow: 0 8px 24px rgba(245, 158, 11, 0.4);
        }

        .btn-custom {
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            border: none;
            color: white;
            padding: 14px 32px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
            letter-spacing: 0.5px;
        }

        .btn-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(59, 130, 246, 0.5);
            color: white;
        }

        .btn-danger-custom {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none;
            color: white;
            padding: 14px 32px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3);
            letter-spacing: 0.5px;
        }

        .btn-danger-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(239, 68, 68, 0.5);
            color: white;
        }

        .dropdown-menu {
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px;
            margin-top: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .dropdown-item {
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .dropdown-item:hover {
            background: rgba(59, 130, 246, 0.2);
            color: white;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }

            .weather-cards {
                grid-template-columns: 1fr;
            }

            .connection-status {
                top: 10px;
                right: 10px;
                font-size: 12px;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
<!-- WebSocket Connection Status -->
<div class="connection-status disconnected" id="connectionStatus">
    <div class="status-dot disconnected" id="statusDot"></div>
    <span id="statusText">Disconnected</span>
</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h2><i class="fas fa-cloud-sun-rain"></i>Weather</h2>
        <p>Real-time Analytics</p>
    </div>
    <div class="nav-item active" data-view="dashboard">
        <i class="fas fa-home"></i>
        <span>Dashboard</span>
    </div>
    <div class="nav-item" data-view="history">
        <i class="fas fa-history"></i>
        <span>History</span>
    </div>
    <div class="nav-item" data-view="analytics">
        <i class="fas fa-chart-line"></i>
        <span>Analytics</span>
    </div>
</div>

<div class="main-content">
    <!-- Dashboard View -->
    <div class="view-section active" id="dashboardView">
        <div class="header">
            <h1>Live Weather Monitor</h1>
            <div class="date-time" id="currentDateTime"></div>
            <div class="mt-3">
                <div class="dropdown">
                    <button class="btn btn-custom dropdown-toggle" type="button" id="locationDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fas fa-map-marker-alt me-2"></i>Ghaarmi danda
                    </button>
                    <ul class="dropdown-menu" aria-labelledby="locationDropdown">
                        <li><a class="dropdown-item" href="#" onclick="connectWebSocket()">
                            <i class="fas fa-plug me-2"></i>Connect to Ghaarmi danda
                        </a></li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="weather-cards">
            <div class="weather-card">
                <div class="weather-card-icon">
                    <i class="fas fa-temperature-high"></i>
                </div>
                <div class="weather-card-title">Temperature</div>
                <div class="weather-card-value" id="temperature">--</div>
                <div class="weather-card-unit">°C</div>
            </div>

            <div class="weather-card">
                <div class="weather-card-icon">
                    <i class="fas fa-tint"></i>
                </div>
                <div class="weather-card-title">Humidity</div>
                <div class="weather-card-value" id="humidity">--</div>
                <div class="weather-card-unit">%</div>
            </div>

            <div class="weather-card">
                <div class="weather-card-icon">
                    <i class="fas fa-compress-arrows-alt"></i>
                </div>
                <div class="weather-card-title">Pressure</div>
                <div class="weather-card-value" id="pressure">--</div>
                <div class="weather-card-unit">hPa</div>
            </div>

            <div class="weather-card">
                <div class="weather-card-icon">
                    <i class="fas fa-sun"></i>
                </div>
                <div class="weather-card-title">UV Index</div>
                <div class="weather-card-value" id="uvIndex">--</div>
                <div class="weather-card-unit">UV</div>
            </div>

            <div class="weather-card">
                <div class="weather-card-icon">
                    <i class="fas fa-cloud-rain"></i>
                </div>
                <div class="weather-card-title">Rain Status</div>
                <div style="margin-top: 15px;">
                    <span class="rain-indicator no" id="rainStatus">No Rain</span>
                </div>
            </div>
        </div>
    </div>

    <!-- History and Analytics sections would go here -->
</div>

<script>
    // WebSocket configuration
    let stompClient = null;
    let isConnected = false;

    // WebSocket connection functions
    function connectWebSocket() {
        updateConnectionStatus('connecting');

        const socket = new SockJS('http://localhost:8080/ws-chat');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function(frame) {
            console.log('Connected: ' + frame);
            isConnected = true;
            updateConnectionStatus('connected');

            // Subscribe to the topic where weather data is published
            stompClient.subscribe('/topic', function(message) {
                const weatherData = JSON.parse(message.body);
                updateCurrentWeather(weatherData);
            });

        }, function(error) {
            console.error('WebSocket connection error:', error);
            isConnected = false;
            updateConnectionStatus('disconnected');

            // Try to reconnect after 5 seconds
            setTimeout(connectWebSocket, 5000);
        });

        // Close dropdown after selection
        const dropdown = document.querySelector('#locationDropdown');
        if (dropdown) {
            bootstrap.Dropdown.getInstance(dropdown)?.hide();
        }
    }

    function updateConnectionStatus(status) {
        const statusElement = document.getElementById('connectionStatus');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        statusElement.className = `connection-status ${status}`;
        statusDot.className = `status-dot ${status}`;

        switch(status) {
            case 'connected':
                statusText.textContent = 'Connected to Ghaarmi danda';
                break;
            case 'disconnected':
                statusText.textContent = 'Disconnected';
                break;
            case 'connecting':
                statusText.textContent = 'Connecting to Ghaarmi danda...';
                break;
        }
    }

    // Update current weather display
    function updateCurrentWeather(data) {
        document.getElementById('temperature').textContent = data.temp.toFixed(1);
        document.getElementById('humidity').textContent = data.humidity.toFixed(0);
        document.getElementById('pressure').textContent = data.pressure.toFixed(1);
        document.getElementById('uvIndex').textContent = data.uv.toFixed(1);

        const rainEl = document.getElementById('rainStatus');
        if (data.rain) {
            rainEl.textContent = 'Raining';
            rainEl.className = 'rain-indicator yes';
        } else {
            rainEl.textContent = 'No Rain';
            rainEl.className = 'rain-indicator no';
        }
    }

    // Update date and time
    function updateDateTime() {
        const now = new Date();
        const options = {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        };
        document.getElementById('currentDateTime').textContent = now.toLocaleDateString('en-US', options);
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // Auto-connect to WebSocket
        connectWebSocket();
    });

    // Initialize Bootstrap dropdown
    const locationDropdown = document.getElementById('locationDropdown');
    if (locationDropdown) {
        new bootstrap.Dropdown(locationDropdown);
    }
</script>
</body>
</html>
